<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BizEnglish">
<meta name="theme-color" content="#1a1a2e">
<title>BizEnglish Daily</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap');

:root {
  --bg: #0f0f1a;
  --bg2: #1a1a2e;
  --bg3: #22223a;
  --card: #1e1e32;
  --card2: #252540;
  --accent: #7c6ff7;
  --accent2: #a59ef8;
  --accent-dim: rgba(124,111,247,0.15);
  --teal: #2dd4bf;
  --teal-dim: rgba(45,212,191,0.12);
  --coral: #f87171;
  --coral-dim: rgba(248,113,113,0.12);
  --amber: #fbbf24;
  --text: #e8e8f0;
  --text2: #9090b0;
  --text3: #5a5a78;
  --border: rgba(255,255,255,0.06);
  --border2: rgba(255,255,255,0.12);
  --radius: 16px;
  --radius-sm: 10px;
  --font: 'DM Sans', sans-serif;
  --font-mono: 'DM Mono', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; background: var(--bg); }

body {
  font-family: var(--font);
  color: var(--text);
  display: flex;
  flex-direction: column;
  max-width: 480px;
  margin: 0 auto;
  position: relative;
}

/* ── NAV ── */
.nav {
  display: flex;
  justify-content: space-around;
  align-items: center;
  padding: 10px 0 max(10px, env(safe-area-inset-bottom));
  background: var(--bg2);
  border-top: 0.5px solid var(--border2);
  flex-shrink: 0;
  order: 2;
}
.nav-btn {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  background: none; border: none; color: var(--text3); cursor: pointer;
  font-family: var(--font); font-size: 10px; padding: 4px 16px;
  transition: color .2s;
}
.nav-btn svg { width: 22px; height: 22px; stroke-width: 1.8; }
.nav-btn.active { color: var(--accent2); }

/* ── SCREENS ── */
.screen { display: none; flex-direction: column; flex: 1; overflow-y: auto; overflow-x: hidden; order: 1; }
.screen.active { display: flex; }

/* ── HOME ── */
.home-header {
  padding: 52px 20px 24px;
  background: linear-gradient(160deg, #1a1a3e 0%, var(--bg) 100%);
  flex-shrink: 0;
}
.home-greeting { font-size: 13px; color: var(--text2); margin-bottom: 4px; }
.home-title { font-size: 26px; font-weight: 600; line-height: 1.2; }
.home-title span { color: var(--accent2); }

.streak-row {
  display: flex; gap: 10px; padding: 0 20px; margin: 16px 0;
}
.streak-card {
  flex: 1; background: var(--card); border-radius: var(--radius-sm);
  border: 0.5px solid var(--border); padding: 14px 12px;
  display: flex; flex-direction: column; gap: 4px;
}
.streak-num { font-size: 28px; font-weight: 600; }
.streak-num.fire { color: var(--amber); }
.streak-num.check { color: var(--teal); }
.streak-label { font-size: 11px; color: var(--text2); }

.today-card {
  margin: 0 20px 16px;
  background: var(--card); border-radius: var(--radius);
  border: 0.5px solid var(--border); overflow: hidden;
}
.today-bar {
  height: 4px; background: var(--bg3);
}
.today-bar-fill {
  height: 100%; background: linear-gradient(90deg, var(--accent), var(--teal));
  transition: width .5s ease;
}
.today-inner { padding: 16px 18px; }
.today-label { font-size: 11px; color: var(--text2); margin-bottom: 8px; text-transform: uppercase; letter-spacing: .8px; }
.today-big { font-size: 15px; font-weight: 500; margin-bottom: 4px; }
.today-sub { font-size: 13px; color: var(--text2); }

.start-btn {
  margin: 0 20px 16px;
  width: calc(100% - 40px);
  padding: 16px;
  background: var(--accent);
  border: none; border-radius: var(--radius);
  color: #fff; font-family: var(--font); font-size: 16px; font-weight: 600;
  cursor: pointer; letter-spacing: .3px;
  transition: opacity .15s, transform .1s;
}
.start-btn:active { opacity: .85; transform: scale(.98); }
.start-btn.done-btn { background: var(--bg3); color: var(--text2); }

.section-label {
  padding: 0 20px; margin-bottom: 10px;
  font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: .8px;
}
.cat-scroll {
  display: flex; gap: 8px; padding: 0 20px 20px;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.cat-scroll::-webkit-scrollbar { display: none; }
.cat-chip {
  flex-shrink: 0; padding: 8px 14px;
  background: var(--card); border: 0.5px solid var(--border);
  border-radius: 99px; font-size: 12px; color: var(--text2);
  cursor: pointer; white-space: nowrap; transition: all .15s;
}
.cat-chip.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent2); }

/* ── STUDY ── */
.study-topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 52px 20px 16px; flex-shrink: 0;
}
.study-back {
  background: none; border: none; color: var(--text2); cursor: pointer;
  display: flex; align-items: center; gap: 4px; font-family: var(--font); font-size: 14px;
}
.study-back svg { width: 18px; height: 18px; stroke-width: 2; }
.study-progress-text { font-size: 12px; color: var(--text3); font-family: var(--font-mono); }

.study-prog-bar {
  height: 3px; background: var(--bg3); margin: 0 20px; border-radius: 99px; flex-shrink: 0;
}
.study-prog-fill {
  height: 100%; background: linear-gradient(90deg, var(--accent), var(--teal));
  border-radius: 99px; transition: width .4s ease;
}

.scenario-scroll { flex: 1; overflow-y: auto; padding: 16px 20px 24px; }

.sc-situation-box {
  background: var(--bg3); border-radius: var(--radius-sm);
  border-left: 3px solid var(--accent); padding: 12px 14px;
  font-size: 13px; color: var(--text2); line-height: 1.65; margin-bottom: 16px;
}

.chat-area { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
.msg-row { display: flex; gap: 8px; align-items: flex-end; }
.msg-row.me { flex-direction: row-reverse; }
.av {
  width: 28px; height: 28px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 600; flex-shrink: 0;
}
.av-other { background: var(--teal-dim); color: var(--teal); }
.av-me { background: var(--accent-dim); color: var(--accent2); }
.bubble {
  max-width: 78%; padding: 10px 14px; font-size: 14px; line-height: 1.6;
  color: var(--text);
}
.bubble-other {
  background: var(--card2); border-radius: 4px 14px 14px 14px;
}
.bubble-me {
  background: var(--accent-dim); border: 0.5px solid rgba(124,111,247,.25);
  border-radius: 14px 4px 14px 14px;
}
.hl { color: var(--accent2); font-weight: 500; }
.msg-name { font-size: 10px; color: var(--text3); margin-bottom: 3px; padding: 0 4px; }

.reveal-section { margin-bottom: 16px; }
.reveal-btn {
  width: 100%; padding: 14px;
  background: var(--card); border: 0.5px solid var(--border2);
  border-radius: var(--radius-sm); color: var(--text2);
  font-family: var(--font); font-size: 14px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: all .15s;
}
.reveal-btn:active { background: var(--card2); }
.reveal-btn svg { width: 16px; height: 16px; stroke-width: 2; }

.phrases-box {
  background: var(--card); border-radius: var(--radius-sm);
  border: 0.5px solid var(--border); overflow: hidden; margin-bottom: 10px;
}
.phrase-row {
  display: flex; align-items: baseline; gap: 10px;
  padding: 11px 14px; border-bottom: 0.5px solid var(--border);
}
.phrase-row:last-child { border-bottom: none; }
.phrase-en { font-size: 13px; font-weight: 500; color: var(--text); flex: 1; }
.phrase-kr { font-size: 12px; color: var(--text2); flex-shrink: 0; }

.tip-box {
  background: var(--teal-dim); border-radius: var(--radius-sm);
  border: 0.5px solid rgba(45,212,191,.2);
  padding: 12px 14px; font-size: 13px; color: var(--teal);
  line-height: 1.65; margin-bottom: 16px;
  display: flex; gap: 8px;
}
.tip-box svg { width: 16px; height: 16px; flex-shrink: 0; margin-top: 1px; stroke-width: 2; }

.mark-row { display: flex; gap: 10px; }
.mark-btn {
  flex: 1; padding: 14px 10px; border-radius: var(--radius-sm);
  border: 0.5px solid var(--border2); font-family: var(--font); font-size: 14px;
  cursor: pointer; font-weight: 500; transition: all .15s;
}
.mark-btn:active { transform: scale(.97); }
.mark-again { background: var(--coral-dim); color: var(--coral); border-color: rgba(248,113,113,.3); }
.mark-good { background: var(--teal-dim); color: var(--teal); border-color: rgba(45,212,191,.3); }

.done-screen {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 40px 20px; text-align: center; gap: 12px;
}
.done-icon { font-size: 56px; line-height: 1; }
.done-title { font-size: 22px; font-weight: 600; }
.done-sub { font-size: 14px; color: var(--text2); line-height: 1.6; }
.done-stats { display: flex; gap: 12px; margin: 8px 0; }
.done-stat { background: var(--card); border-radius: var(--radius-sm); padding: 14px 20px; text-align: center; }
.done-stat-n { font-size: 24px; font-weight: 600; }
.done-stat-n.g { color: var(--teal); }
.done-stat-n.r { color: var(--coral); }
.done-stat-l { font-size: 11px; color: var(--text2); margin-top: 2px; }
.done-back-btn {
  margin-top: 8px; padding: 14px 32px;
  background: var(--accent); border: none; border-radius: var(--radius-sm);
  color: #fff; font-family: var(--font); font-size: 15px; font-weight: 600; cursor: pointer;
}

/* ── LIST ── */
.list-topbar {
  padding: 52px 20px 16px; flex-shrink: 0;
  font-size: 20px; font-weight: 600;
}
.list-filter { display: flex; gap: 6px; padding: 0 20px 12px; overflow-x: auto; scrollbar-width: none; flex-shrink: 0; }
.list-filter::-webkit-scrollbar { display: none; }
.lf-chip { flex-shrink: 0; padding: 6px 12px; border-radius: 99px; border: 0.5px solid var(--border); font-size: 12px; color: var(--text2); cursor: pointer; background: var(--card); transition: all .15s; }
.lf-chip.on { background: var(--accent-dim); border-color: var(--accent); color: var(--accent2); }

.list-scroll { flex: 1; overflow-y: auto; padding: 0 20px 20px; }
.list-item {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 14px; background: var(--card);
  border-radius: var(--radius-sm); margin-bottom: 8px;
  border: 0.5px solid var(--border); cursor: pointer;
  transition: border-color .15s;
}
.list-item:active { border-color: var(--border2); }
.li-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.dot-good { background: var(--teal); }
.dot-again { background: var(--coral); }
.dot-none { background: var(--text3); }
.li-info { flex: 1; }
.li-title { font-size: 14px; font-weight: 500; margin-bottom: 2px; }
.li-cat { font-size: 11px; color: var(--text2); }
.li-arr { color: var(--text3); }
.li-arr svg { width: 16px; height: 16px; stroke-width: 2; }

/* ── STATS ── */
.stats-topbar {
  padding: 52px 20px 24px;
  font-size: 20px; font-weight: 600; flex-shrink: 0;
}
.stats-scroll { flex: 1; overflow-y: auto; padding: 0 20px 24px; }
.big-stat-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.big-stat-card {
  background: var(--card); border-radius: var(--radius);
  border: 0.5px solid var(--border); padding: 18px 16px;
}
.big-stat-n { font-size: 36px; font-weight: 600; margin-bottom: 4px; }
.big-stat-n.accent { color: var(--accent2); }
.big-stat-n.teal { color: var(--teal); }
.big-stat-n.amber { color: var(--amber); }
.big-stat-l { font-size: 12px; color: var(--text2); }

.week-strip { display: flex; gap: 6px; margin-bottom: 20px; }
.day-pill {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 5px;
  padding: 10px 4px; background: var(--card); border-radius: var(--radius-sm);
  border: 0.5px solid var(--border); font-size: 10px; color: var(--text3);
}
.day-circle {
  width: 28px; height: 28px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 600;
}
.day-done { background: var(--teal); color: #0f1a18; }
.day-today { background: var(--accent); color: #fff; }
.day-miss { background: var(--bg3); color: var(--text3); }

.stats-section-title { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 10px; }
.cat-progress { margin-bottom: 20px; }
.cat-prog-row { margin-bottom: 10px; }
.cat-prog-info { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 5px; }
.cat-prog-pct { color: var(--text2); font-family: var(--font-mono); font-size: 12px; }
.cat-prog-track { height: 5px; background: var(--bg3); border-radius: 99px; overflow: hidden; }
.cat-prog-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, var(--accent), var(--teal)); }

.reset-btn {
  width: 100%; padding: 14px; background: none;
  border: 0.5px solid var(--border2); border-radius: var(--radius-sm);
  color: var(--text3); font-family: var(--font); font-size: 14px; cursor: pointer;
  margin-top: 8px;
}
</style>
</head>
<body>

<!-- HOME -->
<div class="screen active" id="screen-home">
  <div class="home-header">
    <div class="home-greeting" id="greeting">Good morning,</div>
    <div class="home-title">매일 10분,<br><span>회의 영어</span> 마스터</div>
  </div>

  <div class="streak-row">
    <div class="streak-card">
      <div class="streak-num fire" id="streak-num">0</div>
      <div class="streak-label">🔥 연속 학습일</div>
    </div>
    <div class="streak-card">
      <div class="streak-num check" id="total-done-num">0</div>
      <div class="streak-label">✓ 완료한 시나리오</div>
    </div>
  </div>

  <div class="today-card">
    <div class="today-bar"><div class="today-bar-fill" id="today-bar-fill" style="width:0%"></div></div>
    <div class="today-inner">
      <div class="today-label">오늘의 학습</div>
      <div class="today-big" id="today-big">아직 시작하지 않았습니다</div>
      <div class="today-sub" id="today-sub">시나리오 5개 · 약 10분</div>
    </div>
  </div>

  <button class="start-btn" id="start-btn" onclick="startStudy()">오늘 학습 시작 →</button>

  <div class="section-label">카테고리별 학습</div>
  <div class="cat-scroll" id="cat-chips"></div>
</div>

<!-- STUDY -->
<div class="screen" id="screen-study">
  <div class="study-topbar">
    <button class="study-back" onclick="goHome()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M19 12H5M5 12l7-7M5 12l7 7"/></svg>
      홈
    </button>
    <div class="study-progress-text" id="study-prog-text">1 / 5</div>
  </div>
  <div class="study-prog-bar"><div class="study-prog-fill" id="study-prog-fill"></div></div>
  <div class="scenario-scroll" id="scenario-scroll"></div>
</div>

<!-- LIST -->
<div class="screen" id="screen-list">
  <div class="list-topbar">전체 시나리오</div>
  <div class="list-filter" id="list-filter"></div>
  <div class="list-scroll" id="list-scroll"></div>
</div>

<!-- STATS -->
<div class="screen" id="screen-stats">
  <div class="stats-topbar">학습 통계</div>
  <div class="stats-scroll" id="stats-scroll"></div>
</div>

<!-- NAV -->
<nav class="nav">
  <button class="nav-btn active" id="nav-home" onclick="showScreen('home')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
    홈
  </button>
  <button class="nav-btn" id="nav-list" onclick="showScreen('list')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
    목록
  </button>
  <button class="nav-btn" id="nav-stats" onclick="showScreen('stats')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
    통계
  </button>
</nav>

<script>
const SCENARIOS = [
  {cat:"회의 시작", title:"회의 열기 & 안건 소개",
   situation:"당신은 팀장으로 월간 프로젝트 검토 회의를 주관합니다. 참석자 7명이 접속한 상황입니다.",
   dialogue:[
    {who:"other",name:"팀원",text:"Is everyone here? Should we get going?"},
    {who:"me",name:"나",text:"<hl>Let's get started.</hl> Thanks everyone for joining. <hl>Let me quickly go over the agenda.</hl> We have three items today — project status, blockers, and next sprint planning."},
    {who:"other",name:"팀원",text:"Sounds good. Should we start with the status update?"},
    {who:"me",name:"나",text:"Exactly. <hl>The purpose of today's meeting is to</hl> align on where we stand before the client review on Friday."}
   ],
   phrases:[
    {en:"Let's get started.",kr:"시작하죠."},
    {en:"Let me quickly go over the agenda.",kr:"안건을 간략히 살펴보겠습니다."},
    {en:"The purpose of today's meeting is to...",kr:"오늘 회의의 목적은 ~입니다."}
   ],
   tip:"회의 시작 첫 30초가 분위기를 결정합니다. 간결하게 목적과 안건을 먼저 제시하세요."
  },
  {cat:"발표 진행", title:"데이터 슬라이드 발표",
   situation:"지난 분기 생산 효율 데이터를 발표 중입니다. 슬라이드를 넘기며 차트를 설명합니다.",
   dialogue:[
    {who:"me",name:"나",text:"<hl>I'll walk you through</hl> the key metrics from Q3. <hl>As you can see from this slide,</hl> output efficiency improved by 18% compared to last quarter."},
    {who:"other",name:"임원",text:"What drove that improvement?"},
    {who:"me",name:"나",text:"<hl>Let me draw your attention to</hl> the bottom chart. The main driver was the automation upgrade in Line 3. <hl>The key takeaway here is</hl> that further investment will compound these gains."}
   ],
   phrases:[
    {en:"I'll walk you through...",kr:"~에 대해 설명하겠습니다."},
    {en:"As you can see from this slide,",kr:"이 슬라이드에서 볼 수 있듯이"},
    {en:"Let me draw your attention to...",kr:"~에 주목해 주세요."},
    {en:"The key takeaway here is...",kr:"핵심 요점은..."}
   ],
   tip:"데이터를 말할 때는 숫자 → 원인 → 시사점 순으로 3단계로 설명하면 설득력이 높아집니다."
  },
  {cat:"의견 제시", title:"대안 방안 제안하기",
   situation:"일정 지연 문제를 논의 중입니다. 팀원들이 추가 인력 투입을 제안하자, 당신은 다른 방안을 제시하려 합니다.",
   dialogue:[
    {who:"other",name:"동료",text:"I think we need to bring in two more engineers to meet the deadline."},
    {who:"me",name:"나",text:"<hl>I'd like to propose an alternative approach.</hl> Instead of adding headcount, <hl>one option worth considering is</hl> a phased delivery — release core features first and push enhancements to the next sprint."},
    {who:"other",name:"동료",text:"What's your rationale?"},
    {who:"me",name:"나",text:"<hl>Based on the data,</hl> onboarding new engineers mid-sprint costs us two weeks of ramp-up time. A phased release keeps us client-facing on schedule."}

    {who:"me",name:"나",text:"<hl>To give you some context,</hl> the figure is based on actual logged downtime hours and standard labor rates — conservative, not inflated. <hl>Moving on to the next point,</hl> I'll now cover the solution options and ROI projection."}
   ],
   phrases:[
    {en:"To summarize what I've covered so far...",kr:"지금까지 다룬 내용을 요약하면..."},
    {en:"To give you some context...",kr:"배경을 설명드리면..."},
    {en:"Moving on to the next point...",kr:"다음 포인트로 넘어가면..."}
   ],
   tip:"발표 중간 '지금까지 요약'을 넣으면 청중의 이해도와 집중도가 크게 올라갑니다."
  },
  {cat:"동의·반대", title:"제안에 적극 동의하기",
   situation:"동료가 제시한 고객 피드백 수집 프로세스 개선안에 동의하며 추가 의견을 보탭니다.",
   dialogue:[
    {who:"other",name:"동료",text:"I think we should add a post-service survey after every maintenance call."},
    {who:"me",name:"나",text:"<hl>I completely agree with that.</hl> Real-time feedback is exactly what we're missing. <hl>That's a valid point</hl> — we've been relying on quarterly reviews, which are too slow."},
    {who:"other",name:"동료",text:"Any thoughts on the format?"},
    {who:"me",name:"나",text:"Keep it to 3 questions max so the completion rate stays high. <hl>I understand the concern, and I think we can address it by</hl> piloting it on the top 10 accounts first."}
   ],
   phrases:[
    {en:"I completely agree with that.",kr:"완전히 동의합니다."},
    {en:"That's a valid point.",kr:"그건 타당한 지적입니다."},
    {en:"I understand the concern, and I think we can address it by...",kr:"우려되는 점을 이해하며, ~을 통해 해결할 수 있습니다."}
   ],
   tip:"동의할 때도 단순히 'Yes' 대신 왜 동의하는지 이유를 덧붙이면 대화가 훨씬 풍부해집니다."
  }
];

const CATS = ["전체", ...new Set(SCENARIOS.map(s => s.cat))];
const TODAY_COUNT = 5;

let state = {
  results: {},
  streak: 0,
  lastStudyDate: null,
  todayDone: [],
  studyQueue: [],
  currentIdx: 0,
  revealed: false,
  studyCat: "전체",
  listCat: "전체"
};

function loadState() {
  try {
    const s = localStorage.getItem("be_state_v2");
    if (s) state = { ...state, ...JSON.parse(s) };
  } catch(e) {}
  updateStreak();
}

function saveState() {
  try { localStorage.setItem("be_state_v2", JSON.stringify(state)); } catch(e) {}
}

function todayKey() {
  return new Date().toISOString().slice(0, 10);
}

function updateStreak() {
  const today = todayKey();
  if (state.lastStudyDate === today) return;
  const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
  if (state.lastStudyDate !== yesterday) state.streak = 0;
}

function isTodayDone() {
  return state.todayDone.length >= TODAY_COUNT && state.todayDone[0] === todayKey();
}

function getGreeting() {
  const h = new Date().getHours();
  if (h < 12) return "Good morning,";
  if (h < 18) return "Good afternoon,";
  return "Good evening,";
}

function showScreen(name) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
  document.getElementById("screen-" + name).classList.add("active");
  const navEl = document.getElementById("nav-" + name);
  if (navEl) navEl.classList.add("active");
  if (name === "home") renderHome();
  if (name === "list") renderList();
  if (name === "stats") renderStats();
}

function renderHome() {
  document.getElementById("greeting").textContent = getGreeting();
  document.getElementById("streak-num").textContent = state.streak;
  const totalDone = Object.values(state.results).filter(v => v === "good").length;
  document.getElementById("total-done-num").textContent = totalDone;

  const done = isTodayDone();
  const pct = done ? 100 : Math.round((state.todayDone.length || 0) / TODAY_COUNT * 100);
  document.getElementById("today-bar-fill").style.width = pct + "%";

  if (done) {
    document.getElementById("today-big").textContent = "오늘 학습 완료!";
    document.getElementById("today-sub").textContent = "내일도 이어서 학습하세요 🔥";
    const btn = document.getElementById("start-btn");
    btn.textContent = "다시 복습하기";
    btn.className = "start-btn";
  } else {
    document.getElementById("today-big").textContent = "시나리오 5개 · 약 10분";
    document.getElementById("today-sub").textContent = "오늘의 학습을 시작하세요";
    document.getElementById("start-btn").textContent = "오늘 학습 시작 →";
    document.getElementById("start-btn").className = "start-btn";
  }

  const chips = document.getElementById("cat-chips");
  chips.innerHTML = CATS.map(c =>
    `<div class="cat-chip${state.studyCat === c ? " active" : ""}" onclick="selectCat('${c}')">${c}</div>`
  ).join("");
}

function selectCat(c) {
  state.studyCat = c;
  renderHome();
}

function startStudy() {
  const pool = SCENARIOS.map((s, i) => i).filter(i => {
    if (state.studyCat !== "전체" && SCENARIOS[i].cat !== state.studyCat) return false;
    return true;
  });
  const again = pool.filter(i => state.results[i] === "again");
  const unseen = pool.filter(i => !state.results[i]);
  const done = pool.filter(i => state.results[i] === "good");
  let queue = [...again, ...unseen, ...done].slice(0, TODAY_COUNT);
  if (queue.length === 0) queue = pool.slice(0, TODAY_COUNT);
  state.studyQueue = queue;
  state.currentIdx = 0;
  state.revealed = false;
  showScreen("study");
  setTimeout(renderScenario, 0);
}

function goHome() {
  showScreen("home");
}

function renderScenario() {
  const scroll = document.getElementById("scenario-scroll");
  const progText = document.getElementById("study-prog-text");
  const progFill = document.getElementById("study-prog-fill");

  const pos = state.currentIdx;
  const total = state.studyQueue.length;

  if (pos >= total) {
    // done
    const good = state.studyQueue.filter(i => state.results[i] === "good").length;
    const again = state.studyQueue.filter(i => state.results[i] === "again").length;
    if (!isTodayDone()) {
      state.todayDone = [todayKey()];
      const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
      if (state.lastStudyDate === yesterday || state.lastStudyDate === todayKey()) {
        state.streak = (state.streak || 0) + (state.lastStudyDate === yesterday ? 1 : 0);
      } else {
        state.streak = 1;
      }
      state.lastStudyDate = todayKey();
      if (state.streak === 0) state.streak = 1;
      saveState();
    }
    progText.textContent = total + " / " + total;
    progFill.style.width = "100%";
    scroll.innerHTML = `<div class="done-screen">
      <div class="done-icon">🎉</div>
      <div class="done-title">오늘 학습 완료!</div>
      <div class="done-stats">
        <div class="done-stat"><div class="done-stat-n g">${good}</div><div class="done-stat-l">이해</div></div>
        <div class="done-stat"><div class="done-stat-n r">${again}</div><div class="done-stat-l">복습 필요</div></div>
      </div>
      <div class="done-sub">내일도 이어서 학습하면<br>스트릭이 계속됩니다 🔥</div>
      <button class="done-back-btn" onclick="goHome()">홈으로 →</button>
    </div>`;
    return;
  }

  progText.textContent = (pos + 1) + " / " + total;
  progFill.style.width = Math.round((pos / total) * 100) + "%";

  const si = state.studyQueue[pos];
  const sc = SCENARIOS[si];

  const dlg = sc.dialogue.map(d => {
    const isMe = d.who === "me";
    const txt = d.text.replace(/<hl>(.*?)<\/hl>/g, '<span class="hl">$1</span>');
    return `<div>
      <div class="msg-name" style="text-align:${isMe ? "right" : "left"}">${d.name}</div>
      <div class="msg-row${isMe ? " me" : ""}">
        <div class="av ${isMe ? "av-me" : "av-other"}">${d.name[0]}</div>
        <div class="bubble ${isMe ? "bubble-me" : "bubble-other"}">${txt}</div>
      </div>
    </div>`;
  }).join("");

  const phrasesHtml = sc.phrases.map(p =>
    `<div class="phrase-row"><div class="phrase-en">${p.en}</div><div class="phrase-kr">${p.kr}</div></div>`
  ).join("");

  scroll.innerHTML = `
    <div class="sc-situation-box">${sc.situation}</div>
    <div class="chat-area">${dlg}</div>
    ${state.revealed ? `
      <div class="reveal-section">
        <div class="phrases-box">${phrasesHtml}</div>
      </div>
      <div class="tip-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
        ${sc.tip}
      </div>
      <div class="mark-row">
        <button class="mark-btn mark-again" onclick="markCard('again')">↩ 다시 볼게요</button>
        <button class="mark-btn mark-good" onclick="markCard('good')">✓ 이해했어요</button>
      </div>` : `
      <button class="reveal-btn" onclick="revealCard()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        핵심 표현 & 팁 확인
      </button>`}
  `;
  scroll.scrollTop = 0;
}

function revealCard() {
  state.revealed = true;
  renderScenario();
}

function markCard(result) {
  const si = state.studyQueue[state.currentIdx];
  state.results[si] = result;
  state.currentIdx++;
  state.revealed = false;
  saveState();
  renderScenario();
}

function renderList() {
  const cats = CATS;
  document.getElementById("list-filter").innerHTML = cats.map(c =>
    `<div class="lf-chip${state.listCat === c ? " on" : ""}" onclick="setListCat('${c}')">${c}</div>`
  ).join("");

  const filtered = SCENARIOS.filter((s, i) => state.listCat === "전체" || s.cat === state.listCat);
  document.getElementById("list-scroll").innerHTML = filtered.map((s) => {
    const gi = SCENARIOS.indexOf(s);
    const r = state.results[gi];
    const dc = r === "good" ? "dot-good" : r === "again" ? "dot-again" : "dot-none";
    return `<div class="list-item" onclick="jumpToScenario(${gi})">
      <div class="li-dot ${dc}"></div>
      <div class="li-info">
        <div class="li-title">${s.title}</div>
        <div class="li-cat">${s.cat}</div>
      </div>
      <div class="li-arr"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="9 18 15 12 9 6"/></svg></div>
    </div>`;
  }).join("");
}

function setListCat(c) {
  state.listCat = c;
  renderList();
}

function jumpToScenario(gi) {
  state.studyQueue = [gi];
  state.currentIdx = 0;
  state.revealed = false;
  showScreen("study");
  setTimeout(renderScenario, 0);
}

function renderStats() {
  const total = SCENARIOS.length;
  const good = Object.values(state.results).filter(v => v === "good").length;
  const again = Object.values(state.results).filter(v => v === "again").length;
  const pct = Math.round(good / total * 100);

  const today = new Date();
  const weekDays = ["일","월","화","수","목","금","토"];
  const weekHtml = Array.from({length: 7}, (_, i) => {
    const d = new Date(today);
    d.setDate(today.getDate() - 6 + i);
    const key = d.toISOString().slice(0, 10);
    const isToday = key === todayKey();
    const isDone = state.lastStudyDate === key || (isToday && isTodayDone());
    const cls = isToday ? "day-today" : isDone ? "day-done" : "day-miss";
    return `<div class="day-pill">
      <div class="day-circle ${cls}">${d.getDate()}</div>
      <div>${weekDays[d.getDay()]}</div>
    </div>`;
  }).join("");

  const catStats = CATS.filter(c => c !== "전체").map(cat => {
    const idxs = SCENARIOS.map((s, i) => s.cat === cat ? i : -1).filter(i => i >= 0);
    const done = idxs.filter(i => state.results[i] === "good").length;
    const pct = idxs.length > 0 ? Math.round(done / idxs.length * 100) : 0;
    return { cat, done, total: idxs.length, pct };
  });

  const catHtml = catStats.map(c =>
    `<div class="cat-prog-row">
      <div class="cat-prog-info"><span>${c.cat}</span><span class="cat-prog-pct">${c.done}/${c.total} · ${c.pct}%</span></div>
      <div class="cat-prog-track"><div class="cat-prog-fill" style="width:${c.pct}%"></div></div>
    </div>`
  ).join("");

  document.getElementById("stats-scroll").innerHTML = `
    <div class="big-stat-row">
      <div class="big-stat-card"><div class="big-stat-n amber">${state.streak}</div><div class="big-stat-l">🔥 연속 학습일</div></div>
      <div class="big-stat-card"><div class="big-stat-n teal">${pct}%</div><div class="big-stat-l">전체 완료율</div></div>
      <div class="big-stat-card"><div class="big-stat-n accent">${good}</div><div class="big-stat-l">이해한 시나리오</div></div>
      <div class="big-stat-card"><div class="big-stat-n" style="color:var(--coral)">${again}</div><div class="big-stat-l">복습 필요</div></div>
    </div>
    <div class="stats-section-title">최근 7일</div>
    <div class="week-strip">${weekHtml}</div>
    <div class="stats-section-title">카테고리별 진도</div>
    <div class="cat-progress">${catHtml}</div>
    <button class="reset-btn" onclick="resetAll()">학습 데이터 초기화</button>
  `;
}

function resetAll() {
  if (!confirm("모든 학습 데이터를 초기화할까요?")) return;
  state.results = {}; state.streak = 0; state.lastStudyDate = null; state.todayDone = [];
  saveState();
  renderStats();
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

loadState();
renderHome();
</script>
</body>
</html>
